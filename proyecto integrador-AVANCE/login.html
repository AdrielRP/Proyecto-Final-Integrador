<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar Sesión - Loana</title>
  <style>
    :root {
      --rosa: #f8d5dd;
      --beige: #fff4ec;
      --marfil: #faf7f0;
      --texto: #4b3f3f;
      --acento: #e6a8b1;
      --hover: #d68a9a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, var(--rosa), var(--beige));
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background-color: var(--marfil);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 25px;
      color: var(--texto);
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 10px;
      background-color: #fffaf9;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: var(--acento);
      color: white;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 20px;
    }

    button:hover {
      background-color: var(--hover);
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    @media (max-width: 500px) {
      .login-container {
        padding: 30px 20px;
      }
    }
    
    .link-login {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .link-login a {
      color: var(--texto);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <input type="text" id="username" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <div class="error" id="error-msg"></div>

    <div class="link-login">Todavía no tienes una cuenta <a href="regist.html">Regístrate</a></div>
  </div>

  <script>
    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      const error = document.getElementById("error-msg");

      // Simulación: usuario y contraseña predefinidos
      if (user === "admin" && pass === "1234") {
        window.location.href = "dashboard.html"; // o muestra un mensaje de éxito
      } else {
        error.textContent = "Usuario o contraseña incorrectos.";
      }
    }
  </script>

</body>
</html>
