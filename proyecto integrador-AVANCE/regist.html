<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro - Loana</title>
  <style>
    :root {
      --rosa: #f8d5dd;
      --beige: #fff4ec;
      --marfil: #faf7f0;
      --texto: #4b3f3f;
      --acento: #e6a8b1;
      --hover: #d68a9a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, var(--rosa), var(--beige));
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .registro-container {
      background-color: var(--marfil);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }

    h2 {
      text-align: center;
      color: var(--texto);
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      background-color: #fffaf9;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: var(--acento);
      color: white;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: var(--hover);
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    .link-login {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .link-login a {
      color: var(--texto);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="registro-container">
    <h2>Registro de Usuario</h2>
    <input type="text" id="nombre" placeholder="Nombre completo" required />
    <input type="email" id="correo" placeholder="Correo electrónico" required />
    <input type="tel" id="telefono" placeholder="Teléfono" required />
    <input type="text" id="usuario" placeholder="Nombre de usuario" required />
    <input type="password" id="clave" placeholder="Contraseña" required />
    <select id="rol">
      <option value="" disabled selected>Seleccione un rol</option>
      <option value="admin">Administrador</option>
      <option value="cliente">Cliente</option>
      <option value="trabajador">Trabajador</option>
    </select>
    <button onclick="registrar()">Registrarse</button>
    <div class="error" id="error-msg"></div>
    <div class="link-login">¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></div>
  </div>

  <script>
    function registrar() {
      const nombre = document.getElementById('nombre').value;
      const correo = document.getElementById('correo').value;
      const telefono = document.getElementById('telefono').value;
      const usuario = document.getElementById('usuario').value;
      const clave = document.getElementById('clave').value;
      const rol = document.getElementById('rol').value;
      const error = document.getElementById('error-msg');

      if (!nombre || !correo || !telefono || !usuario || !clave || !rol) {
        error.textContent = "Todos los campos son obligatorios.";
        return;
      }

      // Simulación de registro (puedes guardar en localStorage si quieres)
      console.log("Usuario registrado:", {
        nombre, correo, telefono, usuario, clave, rol
      });

      alert("Registro exitoso. Redirigiendo al login...");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
